# Dev overlay for docker compose
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What this gives you:
#   - Source code mounted live (edit on host, changes reflected in container)
#   - uvicorn --reload (auto-restarts on file changes)
#   - SESSION_HTTPS_ONLY=false (works over plain HTTP)
#   - Port 8766 (won't conflict if you also run production locally)
#   - Runs as root to avoid filesystem permission issues with mounted volumes
#
services:
  commonplace:
    build: .
    ports:
      - "8766:8765"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - SESSION_HTTPS_ONLY=false
      - COMMONPLACE_USERNAME=${COMMONPLACE_USERNAME:-admin}
      - COMMONPLACE_PASSWORD=${COMMONPLACE_PASSWORD:-dev-password}
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-not-for-production}
    user: root
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765 --reload
